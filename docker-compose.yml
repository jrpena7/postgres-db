# docker-compose.yml

x-timezone-common:
  &timezone
  environment:
    TZ: America/Bogota

services:

  # ============================================================
  # #                         Database                         #
  # ============================================================
  postgres:
    <<: *timezone
    image: postgres:18
    container_name: postgres-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file:
      - .env.postgres 
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s



# ============================================================
# #                         Network                          #
# ============================================================

networks:
  db-net:
    external: true
